<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amoura Luxe - Private Collection</title>
    <style>
        :root {
            --primary: #B8972A;
            --bg: #faf8f5;
            --text: #1a1a1a;
            --white: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        
        .product-container { max-width: 500px; margin: 0 auto; background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-image { width: 100%; height: 300px; background: #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #666; }
        h1 { margin: 15px 0 5px 0; font-size: 24px; }
        .price { color: var(--primary); font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        
        .option-group { margin-bottom: 15px; }
        .option-title { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .options { display: flex; gap: 10px; }
        .option-btn { padding: 8px 16px; border: 1px solid #ccc; background: white; border-radius: 20px; cursor: pointer; }
        .option-btn.selected { border-color: var(--primary); background: #fbf8ee; color: var(--primary); font-weight: bold; }
        
        .main-btn { width: 100%; padding: 15px; background: var(--text); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .main-btn:hover { background: #333; }

        /* Checkout Modal */
        .checkout-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 20px; }
        .checkout-box { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; border: none; background: none; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .summary-box { background: #f9f9f9; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <div class="product-container">
        <div class="product-image">Luxury Bag Image Placeholder</div>
        <h1>Amoura Luxe Bag</h1>
        <div class="price">$250.00</div>

        <div class="option-group">
            <div class="option-title">Select Color</div>
            <div class="options" id="color-options">
                <button class="option-btn selected" onclick="selectOption('color', this, 'Classic Black')">Classic Black</button>
                <button class="option-btn" onclick="selectOption('color', this, 'Luxury Gold')">Luxury Gold</button>
                <button class="option-btn" onclick="selectOption('color', this, 'Soft Beige')">Soft Beige</button>
            </div>
        </div>

        <div class="option-group">
            <div class="option-title">Select Size</div>
            <div class="options" id="size-options">
                <button class="option-btn selected" onclick="selectOption('size', this, 'Standard')">Standard</button>
                <button class="option-btn" onclick="selectOption('size', this, 'Large')">Large</button>
            </div>
        </div>

        <button class="main-btn" onclick="openCheckout()">Proceed to Checkout</button>
    </div>

    <div class="checkout-overlay" id="checkoutModal">
        <div class="checkout-box">
            <button class="close-btn" onclick="closeCheckout()">✕</button>
            <h2>Checkout Details</h2>
            <p style="margin-bottom: 15px; color: #666; font-size: 14px;">Please provide your shipping information to place your order.</p>
            
            <div class="summary-box" id="orderSummary">
                Selected: Classic Black (Standard)
            </div>

            <form action="https://formspree.io/f/YOUR_FORMSPREEE_ID" method="POST">
                <input type="hidden" name="Product" value="Amoura Luxe Bag">
                <input type="hidden" name="Selected Color" id="hiddenColor" value="Classic Black">
                <input type="hidden" name="Selected Size" id="hiddenSize" value="Standard">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="Customer Name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="Customer Email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="Customer Phone" required placeholder="+1 234 567 890">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <textarea name="Customer Address" rows="3" required placeholder="Street, City, State, ZIP code"></textarea>
                </div>

                <button type="submit" class="main-btn" style="background: var(--primary);">Place Order</button>
            </form>
        </div>
    </div>

    <script>
        // Track selections
        let currentSelections = {
            color: "Classic Black",
            size: "Standard"
        };

        function selectOption(type, element, value) {
            // Unselect previous button in the same group
            const buttons = element.parentElement.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.classList.remove('selected'));
            
            // Select current button
            element.classList.add('selected');
            
            // Update tracking variables
            currentSelections[type] = value;
            
            // Update hidden form data
            document.getElementById('hiddenColor').value = currentSelections.color;
            document.getElementById('hiddenSize').value = currentSelections.size;
            
            // Update Text Summary
            document.getElementById('orderSummary').innerText = `Selected: ${currentSelections.color} (${currentSelections.size})`;
        }

        function openCheckout() {
            document.getElementById('checkoutModal').style.display = 'flex';
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').style.display = 'none';
        }
    </script>
</body>
</html>
